<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARI LIVE PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white}
header{background:#111;padding:15px;text-align:center;color:orange}
.container{padding:10px}
.box{background:#1e1e1e;margin-top:10px;padding:10px;border-radius:10px}
input,button{width:100%;margin-top:5px;padding:10px;border:none;border-radius:5px}
button{background:orange;font-weight:bold;cursor:pointer}
#chat{height:150px;overflow:auto;background:#111;margin-top:5px;padding:5px}
.msg{background:#00ccff;margin:3px;padding:5px;border-radius:5px}
</style>
</head>

<body>

<header><h2>PARI LIVE PRO</h2></header>

<div class="container">

<!-- LOGIN -->
<div class="box">
<h3>Konekte / Kreye Kont</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Modpas">
<button onclick="register()">Kreye Kont</button>
<button onclick="login()">Antre</button>
<button onclick="logout()">Dekonekte</button>
</div>

<!-- PARI -->
<div class="box">
<h3>Parye</h3>
<input id="bet" placeholder="Ekri pari ou">
<button onclick="addBet()">Voye Pari</button>
<div id="bets"></div>
</div>

<!-- CHAT -->
<div class="box">
<h3>Chat LIVE</h3>
<div id="chat"></div>
<input id="message" placeholder="Mesaj">
<button onclick="send()">Voye</button>
</div>

</div>
