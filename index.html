<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARI LIVE PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white}
header{background:#111;padding:15px;text-align:center;color:orange}
.container{padding:10px}
.box{background:#1e1e1e;margin-top:10px;padding:10px;border-radius:10px}
input,button{width:100%;margin-top:5px;padding:10px;border:none;border-radius:5px}
button{background:orange;font-weight:bold;cursor:pointer}
#chat,#bets{height:150px;overflow:auto;background:#111;margin-top:5px;padding:5px}
.msg{background:#00ccff;margin:3px;padding:5px;border-radius:5px}
</style>
</head>

<body>

<header><h2>PARI LIVE PRO</h2></header>

<div class="container">

<!-- LOGIN -->
<div class="box">
<h3>Konekte / Kreye Kont</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Modpas">
<button onclick="register()">Kreye Kont</button>
<button onclick="login()">Antre</button>
<button onclick="logout()">Dekonekte</button>
</div>

<!-- PARI -->
<div class="box">
<h3>Parye</h3>
<input id="bet" placeholder="Ekri pari ou">
<button onclick="addBet()">Voye Pari</button>
<div id="bets"></div>
</div>

<!-- CHAT -->
<div class="box">
<h3>Chat LIVE</h3>
<div id="chat"></div>
<input id="message" placeholder="Mesaj">
<button onclick="send()">Voye</button>
</div>

</div>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, addDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA98JXVs0cnUolVQAg2XMAI5K-q3UzCv-Q",
  authDomain: "pari-live-eb46b.firebaseapp.com",
  projectId: "pari-live-eb46b",
  storageBucket: "pari-live-eb46b.firebasestorage.app",
  messagingSenderId: "416142084953",
  appId: "1:416142084953:web:97a79e13aa79335dce5a48"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// LOGIN FUNCTIONS
window.register = () =>{
  createUserWithEmailAndPassword(auth,email.value,password.value)
  .then(()=>alert("Kont kreye"))
  .catch(e=>alert(e.message))
}

window.login = () =>{
  signInWithEmailAndPassword(auth,email.value,password.value)
  .then(()=>alert("Konekte"))
  .catch(e=>alert(e.message))
}

window.logout = () =>{
  signOut(auth)
  .then(()=>alert("Dekonekte"))
  .catch(e=>alert(e.message))
}

// CHAT FUNCTIONS
window.send = async ()=>{
  if(message.value==="") return;
  await addDoc(collection(db,"chat"),{text:message.value});
  message.value="";
}

// PARI FUNCTIONS
window.addBet = async ()=>{
  if(bet.value==="") return;
  await addDoc(collection(db,"bets"),{text:bet.value});
  bet.value="";
}

// LIVE UPDATE CHAT
onSnapshot(collection(db,"chat"),(snap)=>{
  chat.innerHTML="";
  snap.forEach(doc=>{
    chat.innerHTML+=`<div class="msg">${doc.data().text}</div>`;
  });
});

// LIVE UPDATE BET
onSnapshot(collection(db,"bets"),(snap)=>{
  bets.innerHTML="";
  snap.forEach(doc=>{
    bets.innerHTML+=`<div class="msg">${doc.data().text}</div>`;
  });
});
</script>

</body>
</html>
